<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Essays by Priyam</title>
  <meta name="description" content="Say hello, send feedback, or pitch an idea." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Merriweather:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <section class="page-head">
    <div class="container">
      <p class="eyebrow">Contact</p>
      <h1>Let's talk.</h1>
      <p class="muted">Questions, feedback, or an idea worth exploring — I read everything.</p>
    </div>
  </section>
  <section class="section-tight">
    <div class="container" style="max-width:620px">
      <form class="contact-form card" style="gap:14px">
        <div><label style="font-size:.8rem;font-weight:600;color:var(--text-mute)">Name</label>
        <input class="search-input" style="padding-left:1.1rem;margin-top:6px" required placeholder="Your name" /></div>
        <div style="margin-top:14px"><label style="font-size:.8rem;font-weight:600;color:var(--text-mute)">Email</label>
        <input type="email" class="search-input" style="padding-left:1.1rem;margin-top:6px" required placeholder="you@example.com" /></div>
        <div style="margin-top:14px"><label style="font-size:.8rem;font-weight:600;color:var(--text-mute)">Message</label>
        <textarea class="search-input" style="padding-left:1.1rem;margin-top:6px;min-height:140px;border-radius:14px" required placeholder="Write your message…"></textarea></div>
        <div style="margin-top:16px"><button class="btn btn-primary" type="submit">Send message</button></div>
      </form>
      <p class="muted" style="margin-top:18px">Prefer email? Reach me at <a href="mailto:priyam.bhimani777@gmail.com">priyam.bhimani777@gmail.com</a>.</p>
    </div>
  </section>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/main.js"></script>
  <script>buildHeader(); buildFooter(); initForms();</script>
</body>
</html>
